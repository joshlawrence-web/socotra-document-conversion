# Predefined conditions for automated pipeline test runs.
#
# Keys match the document stem (filename without extension).
# Each block number maps to a valid accessor-expression from path-registry.yaml.
# These are used by run_test_pipeline.py --auto to fill the conditional-form.md
# before running --parse-conditional-form.
#
# Update these if new registry paths are added or the fixtures change.

"TestQuoteSummary(quote)":
  1: "quoteNumber != null"
  2: "endTime != null"

"TestItemCert(segment)":
  1: "item.data.itemInWarrantyAtTakeup != null"
  2: "item.data.itemInWorkingOrderAtTakeup != null"
  3: "item.data.purchasePrice != null"

"TestRenewalNotice(segment)":
  1: "policy.data.discountAmount != null"
  2: "policy.data.coolingOffPeriod != null"
  3: "policy.data.gracePeriod != null"

"TestItemsSchedule(segment)":
  1: "item.data.purchasePrice != null"

"TestGiftSchedule(segment)":
  1: "policy.data.discountAmount != null"
  2: "policy.data.gracePeriod != null"

# Block 1 is the [[$disclosureClause]] variant (filled from variant_seeds, no
# condition here); Block 2 is the trailing binary block — the one the old parser
# bug stole the condition from.
"TestVariantThenBinary(segment)":
  2: "policy.data.coolingOffPeriod != null"
