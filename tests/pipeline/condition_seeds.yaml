# Predefined conditions for automated pipeline test runs (variants-only flow).
#
# Keys match the document stem (filename without extension). Under each stem,
# keys are the block keys from Leg 0's machine sidecar (<stem>.conditional-blocks.yaml):
#   - variant block ($token, incl. former plain-text blocks — bare [[text]] is now
#     a hard error at Leg 0, so every non-loop conditional is a named $token): a
#     list of {when, text} rows (row order = priority, first match wins). A single
#     conditioned row with no default row is valid binary show/hide (the DSL
#     supplies an implicit empty default); an N-way block needs one row with a
#     blank `when` as its explicit default.
#   - template block (a `[Name/]` loop's when-only row, keyed by the loop name):
#     a scalar `when` string (condition DSL) to wrap the loop in #if, or blank/
#     omitted for a plain unconditional loop. Carries no text — the loop's
#     wording stays in the document.
#
# run_test_pipeline.py --auto builds the filled <stem>.variants.csv from these
# seeds + Leg 0's stub, then runs --parse-variants-csv.
#
# Conditions are document-scoped, so they reference quote/account/policy(segment)
# accessors — never per-exposure item.* (which has no local at document scope and
# is correctly rejected by the condition DSL).

"TestQuoteSummary(quote)":
  accidentalDamageNote:
    - when: "quote.quoteNumber present"
      text: "Accidental Damage cover is included in your plan. Your item is protected against unexpected physical damage."
  theftCoverNote:
    - when: "quote.endTime present"
      text: "Theft cover is included in your plan. You are protected if your item is lost or stolen."

"TestItemCert(segment)":
  warrantyStatusNote:
    - when: "policy.data.coolingOffPeriod present"
      text: "This item was confirmed to be within the manufacturer warranty period at the date of policy inception."
  workingOrderNote:
    - when: "policy.data.gracePeriod present"
      text: "This item was confirmed to be in full working order at the date of policy inception."
  accidentalDamageNote:
    - when: "policy.data.settlementPeriod present"
      text: "Accidental Damage Cover applies to this policy. Your item is protected against accidental physical damage."

"TestRenewalNotice(segment)":
  loyaltyDiscountNote:
    - when: "policy.data.discountAmount present"
      text: 'A loyalty discount of {policy.data.discountAmount} has been applied to your renewal premium (discount type: {policy.data.discountType}).'
  coolingOffNote:
    - when: "policy.data.coolingOffPeriod present"
      text: "A cooling-off period applies to this renewal. You have the right to cancel within the cooling-off window."
  gracePeriodNote:
    - when: "policy.data.gracePeriod present"
      text: "A grace period may apply if your renewal payment is not received by the due date. Please contact us for details."

"TestItemsSchedule(segment)":
  accidentalDamageNote:
    - when: "policy.data.discountAmount present"
      text: "Accidental Damage Cover applies to the items listed above. Each item is protected against unexpected physical damage."
  # Item: intentionally absent/blank — exercises the plain unconditional loop path.
  Item: ""

# Item is the loop's when-only row: filled here so the #foreach gets wrapped in
# #if($data.Item) — the conditional-loop path (TestItemsSchedule exercises the
# unconditional path instead). theftCoverNote is the trailing tokenised block.
"TestGiftSchedule(segment)":
  Item: "policy.data.discountAmount present"
  theftCoverNote:
    - when: "policy.data.gracePeriod present"
      text: "Theft cover is included in your plan."

# disclosureClause is the N-way [[$token]] variant block.
"TestStateDisclosure(segment)":
  disclosureClause:
    - when: 'discountType == "FLAT"'
      text: 'Policy {policy.policyNumber}: a flat discount of {policy.data.discountAmount} has been applied.'
    - when: 'discountType == "PERCENT"'
      text: 'Policy {policy.policyNumber}: a percentage discount applies to your premium.'
    - when: ''
      text: 'Policy {policy.policyNumber}: no discount applies. Amount on file is {policy.data.discountAmount}.'

# disclosureClause ([[$token]] variant) immediately followed by coolingOffNote
# (a second, plain tokenised block) — the regression guard for the
# variant-then-binary parse fix (now two tokenised blocks, one CSV path).
"TestVariantThenBinary(segment)":
  disclosureClause:
    - when: 'discountType == "FLAT"'
      text: 'Policy {policy.policyNumber}: a flat discount of {policy.data.discountAmount} has been applied.'
    - when: 'discountType == "PERCENT"'
      text: 'Policy {policy.policyNumber}: a percentage discount applies to your premium.'
    - when: ''
      text: 'Policy {policy.policyNumber}: no discount applies. Amount on file is {policy.data.discountAmount}.'
  coolingOffNote:
    - when: "policy.data.coolingOffPeriod present"
      text: "A cooling-off period applies to this policy. You have the right to cancel within the cooling-off window."

# Decision B: the variant text uses a BARE leaf ({discountAmount}) — Leg 4 must
# resolve it to policy.data.discountAmount and wire a real accessor, not a TODO.
"TestVariantBareLeaf(segment)":
  bareLeafClause:
    - when: 'discountType == "FLAT"'
      text: 'Policy {policy.policyNumber}: a flat discount of {discountAmount} has been applied.'
    - when: 'discountType == "PERCENT"'
      text: 'Policy {policy.policyNumber}: a percentage discount applies to your premium.'
    - when: ''
      text: 'Policy {policy.policyNumber}: no discount applies. Amount on file is {discountAmount}.'

# Nested [[$x]] reference inside a variant text cell. benefitClause's text embeds
# [[$amountLabel]]; amountLabel is a SEPARATE placeholder with no document marker
# (nested-only) — the parse step synthesizes its block, condition_dsl peels the ref
# to $doc.amountLabel, and Leg 4 composes it into benefitClause's plugin string.
# Both share policy scope (the nested-label scope-match requirement).
"TestNestedVariantLabel(segment)":
  benefitClause:
    - when: 'discountType == "FLAT"'
      text: 'Policy {policy.policyNumber}: flat discount[[$amountLabel]] of {policy.data.discountAmount} applied.'
    - when: ''
      text: 'Policy {policy.policyNumber}: no discount applies.'
  amountLabel:
    - when: 'discountType == "FLAT"'
      text: ' (flat tier)'
    - when: ''
      text: ''

# The "giant table" fixture: [Name?] conditional row regions. Item + the two
# in-loop / presence regions need no seed ([AccidentalDamage?] is a direct
# #if($item.AccidentalDamage) guard, [Theft?] is auto-wired coverage presence —
# neither surfaces in the variants.csv). CoolingOffRow is the generic
# conditional-region shape: a template block with a when-only row, like a loop.
"TestCoverageGrid(segment)":
  CoolingOffRow: "policy.data.coolingOffPeriod present"
  # In-loop value region: per-item condition rooted at the loop iterator,
  # compiled by Leg 3 to a template #if inside the loop (no plugin key).
  BreakdownLabourRow: 'item.Breakdown.data.labourCovered == "true"'

# [Coverage/] plugin-list loop: unconditional (blank when), like any loop.
"TestCoverageSchedule(segment)": {}
