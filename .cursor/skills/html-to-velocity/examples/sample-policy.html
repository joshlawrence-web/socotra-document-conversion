<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Policy summary</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; color: #222; }
    h1 { font-size: 1.25rem; }
    table { border-collapse: collapse; width: 100%; max-width: 36rem; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>

  <h1>Summary</h1>

  <p><strong>Product:</strong> {{productName}}</p>
  <p><strong>Currency:</strong> {{currency}}</p>
  <p>Reference: <strong>{{policyNumber}}</strong></p>

  <h2>Insureds</h2>
  <table>
    <thead>
      <tr><th>Name</th><th>Location</th></tr>
    </thead>
    <tbody>
      *insureds*
      <tr>
        <td>{{lastName}}</td>
        <td>{{location}}</td>
      </tr>
    </tbody>
  </table>

  <h2>Coverages</h2>
  <ul>
    <li>{{coverageName}} — {{coverageLimit}}</li>
    <li>Template sibling, discarded after conversion</li>
    <li>Another template sibling</li>
  </ul>

</body>
</html>
