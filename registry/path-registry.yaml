# ---------------------------------------------------------------------------
# DataFetcher-sourced paths (plan Leg2-Leg4-datafetcher DF1 + DF6)
#
# These entries represent fields populated via DataFetcherFactory.get().<method>()
# inside the DocumentDataSnapshotPlugin, not by navigating the rendering root type.
# Each entry must declare: source, datafetcher_method, datafetcher_arg,
# datafetcher_key, valid_roots.
# velocity must start with $data.<datafetcher_key>.
# ---------------------------------------------------------------------------
datafetcher_paths:
- field: quotePremiumTotal
  display_name: Total Premium
  source: datafetcher
  datafetcher_method: getQuotePricing
  datafetcher_arg: quote.locator()
  datafetcher_key: pricing
  valid_roots:
  - quote
  velocity: $data.pricing.premiumTotal
  type: string
  base_type: string
  quantifier: ''
  cardinality: exactly_one
  iterable: false
  category: datafetcher
  requires_scope: []
- field: quoteOtherTotal
  display_name: Other Charges Total
  source: datafetcher
  datafetcher_method: getQuotePricing
  datafetcher_arg: quote.locator()
  datafetcher_key: pricing
  valid_roots:
