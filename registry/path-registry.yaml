  product: ItemCare
  display_name: ItemCare
  generated_at: '2026-04-26T09:00:01.657127+00:00'
  source_config_sha256: 79f8ffedc7298f7e039dc5d6d25f6148f56f8147195c8d998115d4148936b56d
  note: 'Socotra Velocity dot-notation paths. Root object is $data (the renderingData
    from DocumentDataSnapshotPlugin). Policy custom fields: $data.data.<field>. Account
    fields: $data.account.data.<field>. Exposure lists: $data.<exposurePlural> (e.g.
    $data.vehicles). Exposure fields: $<iterator>.data.<field> (e.g. $vehicle.data.vin).
    Coverage fields: $<iterator>.<Coverage>.data.<field>. Charge amounts: $data.charges.<ChargeName>.amount
    or $<iterator>.<Coverage>.charges.<ChargeName>.amount. Every entry carries `quantifier`
    + `cardinality` + `iterable` flags plus a `requires_scope` list of #foreach steps
    (outermost first) that must be active for the path to be valid. The previous `optional:
    true/false` key on coverages has been replaced by `quantifier: ''?''` + `cardinality:
    zero_or_one`.'
